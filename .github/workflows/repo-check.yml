name: Repo Check

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: repo-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-check:
    runs-on: ubuntu-24.04
    env:
      CARGO_TERM_COLOR: always
      BLOCKS_BCL_GATE_MODE: warn
      BLOCKS_REPO_CHECK_PREFETCH_FRONTEND_HOSTS: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies for Tauri host probes
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Run repository verification baseline
        run: ./scripts/repo_check.sh
