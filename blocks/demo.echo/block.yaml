id: demo.echo
name: Demo Echo
version: 0.1.0
status: active
owner: blocks-core-team
purpose: Echo a text payload for local registry and CLI smoke testing.
scope:
  - Return the same text input as output for smoke scenarios.
non_goals:
  - Text transformation.
  - Persistent storage.
inputs:
  - name: text
    description: Input text payload.
input_schema:
  text:
    type: string
    required: true
    min_length: 1
preconditions:
  - Input payload must satisfy schema constraints.
outputs:
  - name: text
    description: Echoed text payload.
output_schema:
  text:
    type: string
    required: true
postconditions:
  - Output text equals input text.
implementation:
  kind: rust
  entry: rust/lib.rs
  target: shared
dependencies:
  runtime:
    - serde_json
side_effects:
  - none
timeouts:
  default_ms: 500
  max_ms: 2000
resource_limits:
  memory_mb: 32
  cpu_ms: 200
failure_modes:
  - id: invalid_input
    when: Input text fails validation.
  - id: internal_error
    when: Runtime fails unexpectedly.
  - id: invalid_output
    when: Output payload does not match schema.
error_codes:
  - invalid_input
  - internal_error
  - invalid_output
recovery_strategy:
  - Validate payload before execution.
  - Retry only for transient runtime errors.
verification:
  automated:
    - cargo test -p blocks-cli
  manual:
    - Run blocks block run demo.echo with sample input.
evaluation:
  quality_gates:
    - Echo invariance holds for input/output.
    - Diagnostics are generated on failure.
acceptance_criteria:
  - Valid input returns exactly identical text output.
  - Invalid input fails with structured issues.
  - Failure artifacts are redacted.
debug:
  enabled_in_dev: true
  emits_structured_logs: true
  log_fields:
    - timestamp
    - level
    - event
    - block_id
    - block_version
    - execution_id
    - trace_id
observe:
  metrics:
    - execution_total
    - execution_failed_total
    - execution_latency_ms
  emits_failure_artifact: true
  artifact_policy:
    mode: on_failure
    on_failure_minimum:
      include_input_snapshot: true
      include_error_report: true
      include_output_snapshot: conditional_when_present
    redaction_profile: basic
errors:
  taxonomy:
    - id: invalid_input
    - id: internal_error
    - id: invalid_output
